</div>

</div>
<span class="text-xs font-bold uppercase tracking-widest text-on-surface-variant/60">House Rules</span>

<div class="relative group">
<label class="block text-xs font-bold uppercase tracking-[0.2em] text-on-surface-variant mb-3 transition-colors group-focus-within:text-primary">
