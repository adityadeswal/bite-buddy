<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>BiteBuddy - The Kitchen Manuscript</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Noto+Serif:ital,wght@0,400;0,700;1,400;1,700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "outline": "#8c716a",
                        "on-secondary-fixed": "#191d0e",
                        "inverse-primary": "#ffb4a2",
                        "error": "#ba1a1a",
                        "tertiary": "#2a674c",
                        "on-secondary-container": "#626753",
                        "on-primary-container": "#fffbff",
                        "surface-variant": "#e6e2dd",
                        "on-tertiary": "#ffffff",
                        "inverse-surface": "#31302d",
                        "surface-bright": "#fdf9f4",
                        "secondary-fixed-dim": "#c4c9b1",
                        "on-error-container": "#93000a",
                        "tertiary-fixed": "#b1f0ce",
                        "surface-container-low": "#f7f3ee",
                        "surface": "#fdf9f4",
                        "on-secondary": "#ffffff",
                        "on-tertiary-container": "#f5fff7",
                        "secondary-fixed": "#e0e5cc",
                        "surface-dim": "#ddd9d5",
                        "tertiary-fixed-dim": "#95d4b3",
                        "surface-container-high": "#ebe8e3",
                        "primary-fixed-dim": "#ffb4a2",
                        "surface-container": "#f1ede8",
                        "on-surface-variant": "#59413c",
                        "on-secondary-fixed-variant": "#444937",
                        "outline-variant": "#e0bfb7",
                        "on-primary-fixed": "#3c0700",
                        "primary": "#a83213",
                        "surface-container-highest": "#e6e2dd",
                        "surface-tint": "#ac3415",
                        "on-background": "#1c1c19",
                        "surface-container-lowest": "#ffffff",
                        "tertiary-container": "#448064",
                        "primary-fixed": "#ffdad2",
                        "on-error": "#ffffff",
                        "error-container": "#ffdad6",
                        "on-primary-fixed-variant": "#8a1d00",
                        "inverse-on-surface": "#f4f0eb",
                        "on-primary": "#ffffff",
                        "on-surface": "#1c1c19",
                        "on-tertiary-fixed": "#002114",
                        "on-tertiary-fixed-variant": "#0e5138",
                        "secondary-container": "#e0e5cc",
                        "secondary": "#5c614d",
                        "primary-container": "#ca4a29",
                        "background": "#fdf9f4"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "2xl": "1.5rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Noto Serif"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .editorial-overlay {
            background: linear-gradient(to right, rgba(253, 249, 244, 0.1), rgba(253, 249, 244, 0.4)), url('https://www.transparenttextures.com/patterns/natural-paper.png');
        }
        .glass-panel {
            backdrop-filter: blur(20px);
            background: rgba(255, 255, 255, 0.7);
        }
    </style>
</head>
<body class="bg-surface font-body text-on-surface antialiased overflow-hidden">
<main class="flex min-h-screen w-full">
<!-- Left Side: Editorial Hero Image -->
<section class="hidden lg:flex lg:w-1/2 relative overflow-hidden">
<img alt="A vibrant Indian spread" class="absolute inset-0 h-full w-full object-cover object-center" data-alt="Close-up of a rich Indian thali with dal makhani, handmade roti, vibrant pickles, and fresh herbs on a rustic table with warm sunlight." src="https://lh3.googleusercontent.com/aida-public/AB6AXuDKebRFTzm64K8ktS_KtjHv4aKOrtpV5K6n-LRd_ZI0afKjSEx2MNfmpEB15gWNT9HzYlxqEdDBy4clYrt3HqSCSOyT0T1hGK0hOGMMhS9o6b3YRknFj6QWn9uvLRV15XeHWCSR4YhC2g7DHu8pGycSBO16rIWYQ_EEYqXeCgH9qVdjV3oE9rN1Bft4wGklFMYq2tthfvOERmdvP4xs9tU-STRA-HzbHcCXjpy7LGuMfBmSAl8IMBBequ0cOOvlpMMWoE2PF9EQ2rO8"/>
<div class="absolute inset-0 editorial-overlay mix-blend-multiply opacity-60"></div>
<div class="absolute bottom-16 left-16 z-10 max-w-md">
<p class="font-headline text-on-primary italic text-3xl leading-relaxed tracking-tight">
                    "Cooking is an act of love made visible."
                </p>
<div class="mt-4 h-1 w-24 bg-primary-fixed"></div>
</div>
</section>
<!-- Right Side: Sign-in Panel -->
<section class="w-full lg:w-1/2 flex items-center justify-center p-8 lg:p-24 bg-surface">
<div class="w-full max-w-md space-y-12">
<!-- Brand Anchor -->
<header class="space-y-4">
<h1 class="font-headline text-5xl font-bold tracking-tight text-primary">
                        BiteBuddy
                    </h1>
<p class="font-headline italic text-2xl text-on-surface-variant leading-snug">
                        'Kya khana hai?' is a thing of the past.
                    </p>
</header>
<!-- Actionable Content -->
<div class="space-y-8">
<!-- Phone Input Section -->
<div class="space-y-2">
<label class="block font-label text-xs uppercase tracking-widest text-on-surface-variant font-semibold">
                            Enter Phone Number
                        </label>
<div class="group flex items-center bg-surface-container-low rounded-xl px-4 py-4 focus-within:bg-surface-container-highest transition-all duration-300">
<span class="text-on-surface-variant mr-3 font-medium">+91</span>
<input class="bg-transparent border-none focus:ring-0 w-full text-lg font-medium placeholder:text-outline-variant" placeholder="00000 00000" type="tel"/>
</div>
<p class="text-[10px] text-on-surface-variant/60 mt-1">We'll send a 6-digit OTP via SMS</p>
</div>
<!-- Role Picker (Split Card) -->
<div class="space-y-4">
<label class="block font-label text-xs uppercase tracking-widest text-on-surface-variant font-semibold">
                            Choose Your Role
                        </label>
<div class="grid grid-cols-2 gap-4">
<!-- Role: Flatmate -->
<button class="group relative flex flex-col items-start p-6 rounded-2xl bg-surface-container transition-all duration-300 hover:bg-surface-container-high text-left active:scale-[0.98]">
<div class="mb-4 bg-primary/10 text-primary p-3 rounded-full group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined" data-icon="groups">groups</span>
</div>
<span class="font-label text-sm font-bold text-on-surface">I'm a Flatmate</span>
<span class="text-[10px] text-on-surface-variant mt-1 leading-tight">Joining a shared kitchen</span>
</button>
<!-- Role: Cook -->
<button class="group relative flex flex-col items-start p-6 rounded-2xl bg-surface-container transition-all duration-300 hover:bg-tertiary/10 text-left active:scale-[0.98]">
<div class="mb-4 bg-tertiary/10 text-tertiary p-3 rounded-full group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined" data-icon="restaurant_menu">restaurant_menu</span>
</div>
<span class="font-label text-sm font-bold text-on-surface">I'm a Cook</span>
<span class="text-[10px] text-on-surface-variant mt-1 leading-tight">Managing meals &amp; recipes</span>
</button>
</div>
</div>
<!-- Primary CTA -->
<button class="w-full bg-primary text-on-primary font-label font-semibold py-5 px-10 rounded-full shadow-lg shadow-primary/20 hover:bg-primary-container transition-all duration-300 flex items-center justify-center gap-2 group">
                        Get Started
                        <span class="material-symbols-outlined text-xl transition-transform group-hover:translate-x-1" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
<!-- Footer/Secondary Links -->
<footer class="pt-12 text-center">
<p class="text-xs text-on-surface-variant">
                        By continuing, you agree to our 
                        <a class="underline hover:text-primary transition-colors" href="#">Terms of Service</a> 
                        and 
                        <a class="underline hover:text-primary transition-colors" href="#">Privacy Policy</a>.
                    </p>
</footer>
</div>
</section>
</main>
<!-- Empty State Logic Check (Suppressed Shells) -->
<!-- SideNavBar and TopAppBar are suppressed for transactional/login screens per guidelines -->
</body></html>
